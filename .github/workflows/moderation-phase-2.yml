name: Moderation Phase 2 CI

on:
  pull_request:
    paths:
      - "commands/moderationAdvanced.js"
      - "utils/moderationPhase2*.js"
      - "utils/moderationTasks.js"
      - "utils/moderationAuditLogger.js"
      - "utils/channelLockState.js"
      - "utils/moderationSafety.js"
      - "utils/automod.js"
      - "utils/modlog.js"
      - "api/dashboardModerationPhase2.js"
      - "webhook.js"
      - ".github/workflows/moderation-phase-2.yml"
  push:
    branches:
      - feature/moderation-phase-2

jobs:
  syntax-and-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate JavaScript syntax
        run: |
          node --check commands/moderationAdvanced.js
          node --check utils/moderationPhase2Config.js
          node --check utils/moderationPhase2Bootstrap.js
          node --check utils/moderationTasks.js
          node --check utils/moderationAuditLogger.js
          node --check utils/channelLockState.js
          node --check utils/moderationSafety.js
          node --check utils/automod.js
          node --check utils/modlog.js
          node --check api/dashboardModerationPhase2.js
          node --check webhook.js
      - name: Validate exported Phase 2 contracts
        run: |
          node - <<'NODE'
          const commands = require('./commands/moderationAdvanced')
          const config = require('./utils/moderationPhase2Config')
          const tasks = require('./utils/moderationTasks')
          const locks = require('./utils/channelLockState')
          const api = require('./api/dashboardModerationPhase2')
          if (!Array.isArray(commands.commands) || commands.commands.length !== 9) throw new Error('advanced command definitions missing')
          if (typeof commands.handleInteraction !== 'function') throw new Error('advanced handler missing')
          if (typeof config.normalizePhase2Config !== 'function') throw new Error('phase2 config normalizer missing')
          if (typeof tasks.startModerationTaskScheduler !== 'function') throw new Error('task scheduler missing')
          if (typeof locks.lockChannel !== 'function' || typeof locks.unlockChannel !== 'function') throw new Error('lock state helpers missing')
          if (typeof api.createDashboardModerationPhase2Router !== 'function') throw new Error('advanced dashboard router missing')
          NODE
