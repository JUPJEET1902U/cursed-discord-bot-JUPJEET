name: Dependency review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Review dependency changes
        id: dependency-review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
      - name: Warn when dependency review is unavailable
        if: steps.dependency-review.outcome == 'failure'
        run: echo "::warning::Dependency Review is unavailable under the repository's current settings. Enable the Dependency Graph in repository settings. The critical npm audit check remains blocking."
